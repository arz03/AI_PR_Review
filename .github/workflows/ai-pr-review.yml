name: AI PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_REVIEW_WARN_FILES: ${{ vars.PR_REVIEW_WARN_FILES }}
      PR_REVIEW_SKIP_FILES: ${{ vars.PR_REVIEW_SKIP_FILES }}

    steps:
      - name: Detect fork PR
        id: fork_check
        run: |
          set -euo pipefail
          is_fork="false"
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ] || [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            is_fork="true"
          fi
          echo "is_fork=${is_fork}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        # v4.2.0
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
        with:
          fetch-depth: 0

      - name: Evaluate PR size limits
        id: pr_size
        run: |
          set -euo pipefail
          changed_files="${{ github.event.pull_request.changed_files }}"
          warn_threshold="${PR_REVIEW_WARN_FILES:-20}"
          skip_threshold="${PR_REVIEW_SKIP_FILES:-50}"
          skip_review="false"
          size_note=""

          if [ "$changed_files" -ge "$skip_threshold" ]; then
            skip_review="true"
            size_note="⚠️ PR size is ${changed_files} files (>=${skip_threshold}). Full AI review skipped to avoid token/time explosion."
          elif [ "$changed_files" -ge "$warn_threshold" ]; then
            size_note="⚠️ PR size is ${changed_files} files (>=${warn_threshold}). Review quality may be reduced; prioritize critical findings."
          fi

          {
            echo "skip_review=${skip_review}"
            echo "changed_files=${changed_files}"
            echo "warn_threshold=${warn_threshold}"
            echo "skip_threshold=${skip_threshold}"
            echo "size_note<<EOF"
            echo "$size_note"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@1.3.13

      - name: Run PR review agent
        id: run_review
        if: ${{ steps.pr_size.outputs.skip_review != 'true' && steps.fork_check.outputs.is_fork != 'true' }}
        timeout-minutes: 7
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Fallback route currently targets Groq model (used only on transient failures)
          run_review() {
            local model="$1"
            local out_file="$2"
            local log_file="$3"

            timeout 360s opencode run --pure --print-logs --log-level INFO --agent pr-reviewer --model "$model" --format json "
          Review this pull request:
          - PR #${{ github.event.pull_request.number }}
          - URL: ${{ github.event.pull_request.html_url }}
          - Base: ${{ github.base_ref }}
          - Head: ${{ github.head_ref }}

          Analyze the changes and provide a detailed code review following your configured review procedure.
          You may use read-only bash commands (for PR diff/context) if needed.
          Keep analysis focused on changed files and high-signal findings.
          Output only the final review report in markdown format.
            " > "$out_file" 2> "$log_file"
          }

          echo "Starting OpenCode review run (primary model: opencode/qwen3.6-plus-free)"
          set +e
          run_review "opencode/qwen3.6-plus-free" "pr-review.raw.jsonl" "opencode-debug.log"
          code=$?
          set -e

          if [ "$code" -ne 0 ]; then
            echo "Primary model failed (exit code: $code)"
            echo "--- Primary debug log (last 120 lines) ---"
            tail -n 120 opencode-debug.log || true

            if [ "$code" -eq 124 ] || grep -Eiq "rate limit|429|temporarily unavailable|overloaded|timeout" opencode-debug.log; then
              echo "Retrying with Groq fallback model: groq/openai/gpt-oss-20b"
              set +e
              run_review "groq/openai/gpt-oss-20b" "pr-review.raw.jsonl" "opencode-debug-fallback.log"
              fallback_code=$?
              set -e

              if [ "$fallback_code" -ne 0 ]; then
                echo "Fallback model also failed (exit code: $fallback_code)"
                echo "--- Fallback debug log (last 120 lines) ---"
                tail -n 120 opencode-debug-fallback.log || true
                if [ "$code" -eq 124 ] || [ "$fallback_code" -eq 124 ]; then
                  echo "OpenCode run timed out during primary or fallback execution"
                fi
                exit "$fallback_code"
              fi
            else
              echo "Primary failure was non-transient; skipping fallback retry"
              exit "$code"
            fi
          fi

          echo "OpenCode run completed successfully"
          echo "Raw JSON event lines: $(wc -l < pr-review.raw.jsonl)"

      - name: Build clean markdown report
        id: build_report
        if: ${{ steps.pr_size.outputs.skip_review != 'true' && steps.fork_check.outputs.is_fork != 'true' && steps.run_review.outcome == 'success' }}
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          raw_path = pathlib.Path("pr-review.raw.jsonl")
          md_path = pathlib.Path("pr-review.md")

          chunks = []
          for line in raw_path.read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  event = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if event.get("type") == "text":
                  text = event.get("part", {}).get("text", "")
                  if text:
                      # Strip ANSI escape sequences defensively
                      text = re.sub(r"\x1B\[[0-?]*[ -/]*[@-~]", "", text)
                      chunks.append(text)

          report = "\n\n".join(chunks).strip()
          if not report:
              raise SystemExit("No markdown text output extracted from OpenCode JSON stream")

          # Remove any non-report preface/thought lines before the first report heading.
          heading_match = re.search(
              r"(?m)^(#{1,3}\s*(PR\s+Review\s+Report|Summary|AI\s+PR\s+Review))\b",
              report,
          )
          if heading_match:
              report = report[heading_match.start():].lstrip()

          md_path.write_text(report + "\n", encoding="utf-8")
          PY

          echo "Markdown report generated"
          wc -l pr-review.md

      - name: Ensure review report exists
        if: ${{ always() }}
        run: |
          set -euo pipefail

          report_mode="none"
          if [ "${{ steps.pr_size.outputs.skip_review }}" = "true" ]; then
            report_mode="size_skip"
          elif [ "${{ steps.fork_check.outputs.is_fork }}" = "true" ]; then
            report_mode="fork_skip"
          elif [ "${{ steps.run_review.outcome }}" != "success" ] || [ "${{ steps.build_report.outcome }}" = "failure" ] || [ ! -s pr-review.md ]; then
            report_mode="exec_fallback"
          fi

          REPORT_MODE="$report_mode" python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          mode = os.environ.get("REPORT_MODE", "none")

          if mode == "size_skip":
              report = textwrap.dedent("""\
              ## PR Review Report — PR #${{ github.event.pull_request.number }}: `${{ github.head_ref }}` → `${{ github.base_ref }}`

              ## Summary
              - **Overall Risk**: 🟡 Medium
              - **Key Themes**:
                - Review skipped due to PR size policy.
                - Changed files: ${{ steps.pr_size.outputs.changed_files }}
              - **Verdict**: Manual review required due to large PR size.

              ## Critical Findings (critical/high)
              - None (automated review skipped)

              ## Other Findings (medium/low/info)
              - [ ] PR exceeds automated review size threshold.

              ## What Was Checked
              - PR metadata and size policy gate.

              ## Reviewer Focus
              - Split PR into smaller chunks or provide targeted scope for review.

              ## Agent Notes
              - Automated review intentionally skipped at >=${{ steps.pr_size.outputs.skip_threshold }} changed files.
              """)
              Path("pr-review.md").write_text(report, encoding="utf-8")
          elif mode == "fork_skip":
              report = textwrap.dedent("""\
              ## PR Review Report — PR #${{ github.event.pull_request.number }}: `${{ github.head_ref }}` → `${{ github.base_ref }}`

              ## Summary
              - **Overall Risk**: 🟡 Medium
              - **Key Themes**:
                - This PR originates from a fork repository.
                - Repository secrets are unavailable for fork PRs in this workflow context.
              - **Verdict**: Automated full review unavailable for fork PR; manual review required.

              ## Critical Findings (critical/high)
              - None (fork safety mode)

              ## Other Findings (medium/low/info)
              - [ ] Fork PR detected; skipped secret-dependent AI review.

              ## What Was Checked
              - PR metadata and fork detection policy.

              ## Reviewer Focus
              - Perform manual review or run trusted internal mirror workflow.

              ## Agent Notes
              - No secret-dependent operations were attempted for this fork PR.
              """)
              Path("pr-review.md").write_text(report, encoding="utf-8")
          elif mode == "exec_fallback":
              report = textwrap.dedent("""\
              ## PR Review Report — PR #${{ github.event.pull_request.number }}: `${{ github.head_ref }}` → `${{ github.base_ref }}`

              ## Summary
              - **Overall Risk**: 🟡 Medium
              - **Key Themes**:
                - Automated review was unavailable for this run.
                - Fallback diagnostics were captured as workflow artifacts.
              - **Verdict**: Manual review recommended for this run.

              ## Critical Findings (critical/high)
              - None (review execution failed)

              ## Other Findings (medium/low/info)
              - [ ] AI review unavailable due to transient execution error/timeout.

              ## What Was Checked
              - Workflow execution state and diagnostic logs.

              ## Reviewer Focus
              - Check artifacts: `opencode-debug.log`, `opencode-debug-fallback.log`, and rerun if needed.

              ## Agent Notes
              - No secrets are included in this fallback report.
              """)
              Path("pr-review.md").write_text(report, encoding="utf-8")
          PY

          if [ -n "${{ steps.pr_size.outputs.size_note }}" ]; then
            printf "\n## Size Policy Note\n- %s\n" "${{ steps.pr_size.outputs.size_note }}" >> pr-review.md
          fi

      - name: Sanitize review output
        if: ${{ always() }}
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          p = Path("pr-review.md")
          if not p.exists():
              raise SystemExit("pr-review.md not found for sanitization")

          text = p.read_text(encoding="utf-8")
          rules = [
              (r"gsk_[A-Za-z0-9]{20,}", "[REDACTED_GROQ_KEY]"),
              (r"sk-[A-Za-z0-9]{20,}", "[REDACTED_API_KEY]"),
              (r"(?i)(api[_-]?key\s*[:=]\s*)(['\"]?)[^\s'\"]+", r"\1[REDACTED]"),
              (r"(?i)(token\s*[:=]\s*)(['\"]?)[^\s'\"]+", r"\1[REDACTED]"),
              (r"(?i)(password\s*[:=]\s*)(['\"]?)[^\s'\"]+", r"\1[REDACTED]"),
              (r"(?i)(postgres(?:ql)?://[^:\s/]+:)[^@\s]+(@)", r"\1[REDACTED]\2"),
          ]

          total = 0
          for pattern, repl in rules:
              text, n = re.subn(pattern, repl, text)
              total += n

          p.write_text(text, encoding="utf-8")
          print(f"Sanitization complete. Redactions applied: {total}")
          PY

      - name: Post or update PR review comment
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "<!-- ai-pr-review -->"
            echo "_Last updated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')_"
            echo
            cat pr-review.md
          } > comment-body.md

          comment_id=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --paginate --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- ai-pr-review -->")) | .id' | tail -n 1)

          if [ -n "$comment_id" ]; then
            python -c "import json,pathlib; body=pathlib.Path('comment-body.md').read_text(encoding='utf-8'); pathlib.Path('comment-payload.json').write_text(json.dumps({'body': body}), encoding='utf-8')"
            set +e
            gh api "repos/${{ github.repository }}/issues/comments/${comment_id}" --method PATCH --input comment-payload.json
            patch_code=$?
            set -e
            if [ "$patch_code" -ne 0 ]; then
              echo "Marker comment update failed; creating fallback comment"
              gh pr comment "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" \
                --body-file comment-body.md
            fi
          else
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body-file comment-body.md
          fi

      - name: Extract Slack summary
        id: extract_summary
        if: ${{ always() }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          pr_title = os.environ.get("PR_TITLE", "PR Review")
          pr_url = os.environ.get("PR_URL", "")
          report_path = Path("pr-review.md")
          text = report_path.read_text(encoding="utf-8") if report_path.exists() else ""

          def clean(value: str) -> str:
              value = re.sub(r"[`*_>#\[\]\(\)]", "", value)
              value = re.sub(r"\s+", " ", value).strip(" -:\t")
              return value

          # Risk extraction
          risk_label = "Medium"
          m_risk = re.search(r"(?im)^\s*-\s*\*\*Overall Risk\*\*:\s*([^\n]+)", text)
          if m_risk:
              raw = m_risk.group(1).strip()
              if re.search(r"critical|high", raw, re.I):
                  risk_label = "Critical"
              elif re.search(r"medium", raw, re.I):
                  risk_label = "Medium"
              elif re.search(r"low", raw, re.I):
                  risk_label = "Low"
          risk_emoji = "🔴" if risk_label in ("Critical", "High") else ("🟡" if risk_label == "Medium" else "🟢")

          # Severity counts (case-insensitive)
          counts = {"critical": 0, "high": 0, "medium": 0}
          for sev in re.findall(r"(?i)severity\*\*?:\s*([a-z]+)|severity:\s*([a-z]+)", text):
              s = (sev[0] or sev[1] or "").lower()
              if s in counts:
                  counts[s] += 1

          # Fallback count estimation from sections if explicit severity tags absent
          if sum(counts.values()) == 0:
              crit_block = re.search(r"(?is)^##\s*Critical Findings.*?(?=^##\s|\Z)", text, re.M)
              other_block = re.search(r"(?is)^##\s*Other Findings.*?(?=^##\s|\Z)", text, re.M)
              counts["critical"] = len(re.findall(r"(?m)^\s*- \[ \]", crit_block.group(0) if crit_block else ""))
              counts["high"] = 0
              counts["medium"] = len(re.findall(r"(?m)^\s*- \[ \]", other_block.group(0) if other_block else ""))

          # Summary extraction: prefer Verdict, then first Key Theme bullet
          summary = "Review completed. See full PR comment for details."
          m_verdict = re.search(r"(?im)^\s*-\s*\*\*Verdict\*\*:\s*(.+)$", text)
          if m_verdict:
              summary = clean(m_verdict.group(1))
          else:
              m_theme = re.search(r"(?is)^\s*-\s*\*\*Key Themes\*\*:\s*(.*?)\n\s*-\s*\*\*Verdict\*\*:", text, re.M)
              if m_theme:
                  theme_lines = re.findall(r"(?m)^\s*-\s*(.+)$", m_theme.group(1))
                  if theme_lines:
                      summary = clean(theme_lines[0])

          slack_text = (
              f"🔎 *AI PR Review* — {pr_title}\n"
              f"{pr_url}\n\n"
              f"*Risk:* {risk_emoji} {risk_label}\n"
              f"*Findings:* Critical:{counts['critical']} • High:{counts['high']} • Medium:{counts['medium']}\n"
              f"*Summary:* {summary}\n"
              f"*Full review:* {pr_url}"
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write("slack_text<<EOF\n")
              out.write(slack_text + "\n")
              out.write("EOF\n")
          PY

      - name: Detect Slack webhook availability
        id: slack_check
        if: ${{ always() && steps.fork_check.outputs.is_fork != 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          has_slack="false"
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            has_slack="true"
          fi
          echo "has_slack=${has_slack}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: ${{ always() && steps.fork_check.outputs.is_fork != 'true' && steps.slack_check.outputs.has_slack == 'true' }}
        # v2.1.1
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ${{ toJson(steps.extract_summary.outputs.slack_text) }}
            }

      - name: Upload review artifacts
        if: ${{ always() }}
        # v4.3.4
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b
        with:
          name: ai-pr-review-artifacts-pr-${{ github.event.pull_request.number }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            pr-review.raw.jsonl
            pr-review.md
            opencode-debug.log
            opencode-debug-fallback.log
