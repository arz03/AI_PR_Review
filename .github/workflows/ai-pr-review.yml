name: AI PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai

      - name: Run PR review agent
        timeout-minutes: 7
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_EXPERIMENTAL_OUTPUT_TOKEN_MAX: "6000"
        run: |
          set -euo pipefail
          # Groq fallback (disabled for free-tier testing):
          # opencode run --agent pr-reviewer --model groq/openai/gpt-oss-120b "..." > pr-review.md 2>&1
          run_review() {
            local model="$1"
            local out_file="$2"
            local log_file="$3"

            timeout 240s opencode run --pure --print-logs --log-level INFO --agent pr-reviewer --model "$model" --format json "
          Review this pull request:
          - PR #${{ github.event.pull_request.number }}
          - URL: ${{ github.event.pull_request.html_url }}
          - Base: ${{ github.base_ref }}
          - Head: ${{ github.head_ref }}

          Analyze the changes and provide a detailed code review following your configured review procedure.
          Output only the final review report in markdown format.
            " > "$out_file" 2> "$log_file"
          }

          echo "Starting OpenCode review run (primary model: opencode/qwen3.6-plus-free)"
          set +e
          run_review "opencode/qwen3.6-plus-free" "pr-review.raw.jsonl" "opencode-debug.log"
          code=$?
          set -e

          if [ "$code" -ne 0 ]; then
            echo "Primary model failed (exit code: $code)"
            echo "--- Primary debug log (last 120 lines) ---"
            tail -n 120 opencode-debug.log || true

            echo "Retrying with Groq fallback model: groq/openai/gpt-oss-20b"
            set +e
            run_review "groq/openai/gpt-oss-20b" "pr-review.raw.jsonl" "opencode-debug-fallback.log"
            fallback_code=$?
            set -e

            if [ "$fallback_code" -ne 0 ]; then
              echo "Fallback model also failed (exit code: $fallback_code)"
              echo "--- Fallback debug log (last 120 lines) ---"
              tail -n 120 opencode-debug-fallback.log || true
              if [ "$code" -eq 124 ] || [ "$fallback_code" -eq 124 ]; then
                echo "OpenCode run timed out during primary or fallback execution"
              fi
              exit "$fallback_code"
            fi
          fi

          echo "OpenCode run completed successfully"
          echo "Raw JSON event lines: $(wc -l < pr-review.raw.jsonl)"

      - name: Build clean markdown report
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          raw_path = pathlib.Path("pr-review.raw.jsonl")
          md_path = pathlib.Path("pr-review.md")

          chunks = []
          for line in raw_path.read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  event = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if event.get("type") == "text":
                  text = event.get("part", {}).get("text", "")
                  if text:
                      # Strip ANSI escape sequences defensively
                      text = re.sub(r"\x1B\[[0-?]*[ -/]*[@-~]", "", text)
                      chunks.append(text)

          report = "\n\n".join(chunks).strip()
          if not report:
              raise SystemExit("No markdown text output extracted from OpenCode JSON stream")

          # Remove any non-report preface/thought lines before the first report heading.
          heading_match = re.search(
              r"(?m)^(#{1,3}\s*(PR\s+Review\s+Report|Summary|AI\s+PR\s+Review))\b",
              report,
          )
          if heading_match:
              report = report[heading_match.start():].lstrip()

          md_path.write_text(report + "\n", encoding="utf-8")
          PY

          echo "Markdown report generated"
          wc -l pr-review.md

      - name: Post PR review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file pr-review.md

      - name: Extract Slack summary
        id: extract_summary
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"

          risk="🟢"
          if grep -Eiq "overall risk.*critical|overall risk.*high|🔴" pr-review.md; then
            risk="🔴"
          elif grep -Eiq "overall risk.*medium|🟡" pr-review.md; then
            risk="🟡"
          fi

          c=$(grep -Eic "\*\*Severity\*\*:\s*Critical|Severity:\s*Critical" pr-review.md || true)
          h=$(grep -Eic "\*\*Severity\*\*:\s*High|Severity:\s*High" pr-review.md || true)
          m=$(grep -Eic "\*\*Severity\*\*:\s*Medium|Severity:\s*Medium" pr-review.md || true)
          l=$(grep -Eic "\*\*Severity\*\*:\s*Low|Severity:\s*Low" pr-review.md || true)

          if [ "$c" -eq 0 ] && [ "$h" -eq 0 ] && [ "$m" -eq 0 ] && [ "$l" -eq 0 ]; then
            c=$(awk '/^## Critical Findings/{flag=1;next}/^## /{if(flag){exit}}flag' pr-review.md | grep -c '^- \[ \]' || true)
            h=0
            m=$(awk '/^## Other Findings/{flag=1;next}/^## /{if(flag){exit}}flag' pr-review.md | grep -c '^- \[ \]' || true)
            l=0
          fi

          summary_line=$(awk '/^## Summary/{flag=1;next}/^## /{if(flag){exit}}flag' pr-review.md | sed '/^\s*$/d' | head -n 1)
          if [ -z "$summary_line" ]; then
            summary_line="Review completed. See full PR comment for details."
          fi

          slack_text="🔎 *AI PR Review* — ${pr_title}\n${pr_url}\n\nRisk: ${risk}  |  Findings: C:${c} H:${h} M:${m} L:${l}\nSummary: ${summary_line}\nFull review: ${pr_url}"

          {
            echo "slack_text<<EOF"
            echo "$slack_text"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ${{ toJson(steps.extract_summary.outputs.slack_text) }}
            }
