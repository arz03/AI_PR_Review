name: AI PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      PR_REVIEW_WARN_FILES: ${{ vars.PR_REVIEW_WARN_FILES }}
      PR_REVIEW_SKIP_FILES: ${{ vars.PR_REVIEW_SKIP_FILES }}

    steps:
      - name: Checkout repository
        # v4.2.0
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
        with:
          fetch-depth: 0

      - name: Evaluate PR size limits
        id: pr_size
        run: |
          set -euo pipefail
          changed_files="${{ github.event.pull_request.changed_files }}"
          warn_threshold="${PR_REVIEW_WARN_FILES:-20}"
          skip_threshold="${PR_REVIEW_SKIP_FILES:-50}"
          skip_review="false"
          size_note=""

          if [ "$changed_files" -ge "$skip_threshold" ]; then
            skip_review="true"
            size_note="⚠️ PR size is ${changed_files} files (>=${skip_threshold}). Full AI review skipped to avoid token/time explosion."
          elif [ "$changed_files" -ge "$warn_threshold" ]; then
            size_note="⚠️ PR size is ${changed_files} files (>=${warn_threshold}). Review quality may be reduced; prioritize critical findings."
          fi

          {
            echo "skip_review=${skip_review}"
            echo "changed_files=${changed_files}"
            echo "warn_threshold=${warn_threshold}"
            echo "skip_threshold=${skip_threshold}"
            echo "size_note<<EOF"
            echo "$size_note"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai

      - name: Run PR review agent
        id: run_review
        if: ${{ steps.pr_size.outputs.skip_review != 'true' }}
        timeout-minutes: 7
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Groq fallback (disabled for free-tier testing):
          # opencode run --agent pr-reviewer --model groq/openai/gpt-oss-120b "..." > pr-review.md 2>&1
          run_review() {
            local model="$1"
            local out_file="$2"
            local log_file="$3"

            timeout 360s opencode run --pure --print-logs --log-level INFO --agent pr-reviewer --model "$model" --format json "
          Review this pull request:
          - PR #${{ github.event.pull_request.number }}
          - URL: ${{ github.event.pull_request.html_url }}
          - Base: ${{ github.base_ref }}
          - Head: ${{ github.head_ref }}

          Analyze the changes and provide a detailed code review following your configured review procedure.
          You may use read-only bash commands (for PR diff/context) if needed.
          Keep analysis focused on changed files and high-signal findings.
          Output only the final review report in markdown format.
            " > "$out_file" 2> "$log_file"
          }

          echo "Starting OpenCode review run (primary model: opencode/qwen3.6-plus-free)"
          set +e
          run_review "opencode/qwen3.6-plus-free" "pr-review.raw.jsonl" "opencode-debug.log"
          code=$?
          set -e

          if [ "$code" -ne 0 ]; then
            echo "Primary model failed (exit code: $code)"
            echo "--- Primary debug log (last 120 lines) ---"
            tail -n 120 opencode-debug.log || true

            if [ "$code" -eq 124 ] || grep -Eiq "rate limit|429|temporarily unavailable|overloaded|timeout" opencode-debug.log; then
              echo "Retrying with Groq fallback model: groq/openai/gpt-oss-20b"
              set +e
              run_review "groq/openai/gpt-oss-20b" "pr-review.raw.jsonl" "opencode-debug-fallback.log"
              fallback_code=$?
              set -e

              if [ "$fallback_code" -ne 0 ]; then
                echo "Fallback model also failed (exit code: $fallback_code)"
                echo "--- Fallback debug log (last 120 lines) ---"
                tail -n 120 opencode-debug-fallback.log || true
                if [ "$code" -eq 124 ] || [ "$fallback_code" -eq 124 ]; then
                  echo "OpenCode run timed out during primary or fallback execution"
                fi
                exit "$fallback_code"
              fi
            else
              echo "Primary failure was non-transient; skipping fallback retry"
              exit "$code"
            fi
          fi

          echo "OpenCode run completed successfully"
          echo "Raw JSON event lines: $(wc -l < pr-review.raw.jsonl)"

      - name: Build clean markdown report
        id: build_report
        if: ${{ steps.pr_size.outputs.skip_review != 'true' && steps.run_review.outcome == 'success' }}
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          raw_path = pathlib.Path("pr-review.raw.jsonl")
          md_path = pathlib.Path("pr-review.md")

          chunks = []
          for line in raw_path.read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  event = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if event.get("type") == "text":
                  text = event.get("part", {}).get("text", "")
                  if text:
                      # Strip ANSI escape sequences defensively
                      text = re.sub(r"\x1B\[[0-?]*[ -/]*[@-~]", "", text)
                      chunks.append(text)

          report = "\n\n".join(chunks).strip()
          if not report:
              raise SystemExit("No markdown text output extracted from OpenCode JSON stream")

          # Remove any non-report preface/thought lines before the first report heading.
          heading_match = re.search(
              r"(?m)^(#{1,3}\s*(PR\s+Review\s+Report|Summary|AI\s+PR\s+Review))\b",
              report,
          )
          if heading_match:
              report = report[heading_match.start():].lstrip()

          md_path.write_text(report + "\n", encoding="utf-8")
          PY

          echo "Markdown report generated"
          wc -l pr-review.md

      - name: Ensure review report exists
        if: ${{ always() }}
        run: |
          set -euo pipefail

          report_mode="none"
          if [ "${{ steps.pr_size.outputs.skip_review }}" = "true" ]; then
            report_mode="size_skip"
          elif [ "${{ steps.run_review.outcome }}" != "success" ] || [ "${{ steps.build_report.outcome }}" = "failure" ] || [ ! -s pr-review.md ]; then
            report_mode="exec_fallback"
          fi

          REPORT_MODE="$report_mode" python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          mode = os.environ.get("REPORT_MODE", "none")

          if mode == "size_skip":
              report = textwrap.dedent("""\
              ## PR Review Report — PR #${{ github.event.pull_request.number }}: `${{ github.head_ref }}` → `${{ github.base_ref }}`

              ## Summary
              - **Overall Risk**: 🟡 Medium
              - **Key Themes**:
                - Review skipped due to PR size policy.
                - Changed files: ${{ steps.pr_size.outputs.changed_files }}
              - **Verdict**: Manual review required due to large PR size.

              ## Critical Findings (critical/high)
              - None (automated review skipped)

              ## Other Findings (medium/low/info)
              - [ ] PR exceeds automated review size threshold.

              ## What Was Checked
              - PR metadata and size policy gate.

              ## Reviewer Focus
              - Split PR into smaller chunks or provide targeted scope for review.

              ## Agent Notes
              - Automated review intentionally skipped at >=${{ steps.pr_size.outputs.skip_threshold }} changed files.
              """)
              Path("pr-review.md").write_text(report, encoding="utf-8")
          elif mode == "exec_fallback":
              report = textwrap.dedent("""\
              ## PR Review Report — PR #${{ github.event.pull_request.number }}: `${{ github.head_ref }}` → `${{ github.base_ref }}`

              ## Summary
              - **Overall Risk**: 🟡 Medium
              - **Key Themes**:
                - Automated review was unavailable for this run.
                - Fallback diagnostics were captured as workflow artifacts.
              - **Verdict**: Manual review recommended for this run.

              ## Critical Findings (critical/high)
              - None (review execution failed)

              ## Other Findings (medium/low/info)
              - [ ] AI review unavailable due to transient execution error/timeout.

              ## What Was Checked
              - Workflow execution state and diagnostic logs.

              ## Reviewer Focus
              - Check artifacts: `opencode-debug.log`, `opencode-debug-fallback.log`, and rerun if needed.

              ## Agent Notes
              - No secrets are included in this fallback report.
              """)
              Path("pr-review.md").write_text(report, encoding="utf-8")
          PY

          if [ -n "${{ steps.pr_size.outputs.size_note }}" ]; then
            printf "\n## Size Policy Note\n- %s\n" "${{ steps.pr_size.outputs.size_note }}" >> pr-review.md
          fi

      - name: Post or update PR review comment
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "<!-- ai-pr-review -->"
            echo "_Last updated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')_"
            echo
            cat pr-review.md
          } > comment-body.md

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file comment-body.md \
            --edit-last \
            --create-if-none

      - name: Extract Slack summary
        id: extract_summary
        if: ${{ always() }}
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"

          risk="🟢"
          if grep -Eiq "overall risk.*critical|overall risk.*high|🔴" pr-review.md; then
            risk="🔴"
          elif grep -Eiq "overall risk.*medium|🟡" pr-review.md; then
            risk="🟡"
          fi

          c=$(grep -Eic "\*\*Severity\*\*:\s*Critical|Severity:\s*Critical" pr-review.md || true)
          h=$(grep -Eic "\*\*Severity\*\*:\s*High|Severity:\s*High" pr-review.md || true)
          m=$(grep -Eic "\*\*Severity\*\*:\s*Medium|Severity:\s*Medium" pr-review.md || true)
          l=$(grep -Eic "\*\*Severity\*\*:\s*Low|Severity:\s*Low" pr-review.md || true)

          if [ "$c" -eq 0 ] && [ "$h" -eq 0 ] && [ "$m" -eq 0 ] && [ "$l" -eq 0 ]; then
            c=$(awk '/^## Critical Findings/{flag=1;next}/^## /{if(flag){exit}}flag' pr-review.md | grep -c '^- \[ \]' || true)
            h=0
            m=$(awk '/^## Other Findings/{flag=1;next}/^## /{if(flag){exit}}flag' pr-review.md | grep -c '^- \[ \]' || true)
            l=0
          fi

          summary_line=$(awk '/^## Summary/{flag=1;next}/^## /{if(flag){exit}}flag' pr-review.md | sed '/^\s*$/d' | head -n 1)
          if [ -z "$summary_line" ]; then
            summary_line="Review completed. See full PR comment for details."
          fi

          # Normalize markdown-heavy summary text for Slack readability.
          summary_line=$(echo "$summary_line" | sed -E 's/[`*_#>//-]+/ /g; s/[[:space:]]+/ /g; s/^\s+|\s+$//g')

          slack_text=$(cat <<EOF
          🔎 *AI PR Review* — ${pr_title}
          ${pr_url}

          Risk: ${risk}  |  Findings: Critical:${c} High:${h} Medium:${m}
          Summary: ${summary_line}
          Full review: ${pr_url}
          EOF
          )

          {
            echo "slack_text<<EOF"
            echo "$slack_text"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        # v2.1.1
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ${{ toJson(steps.extract_summary.outputs.slack_text) }}
            }

      - name: Upload review artifacts
        if: ${{ always() }}
        # v4.3.4
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b
        with:
          name: ai-pr-review-artifacts-pr-${{ github.event.pull_request.number }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            pr-review.raw.jsonl
            pr-review.md
            opencode-debug.log
            opencode-debug-fallback.log
